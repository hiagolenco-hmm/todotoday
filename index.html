<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas - Outro Nível</title>
    <style>
        :root {
            --primary: #6200ee;
            --bg: #f4f7f6;
            --text: #333;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 600px;
            background: white;
            margin-top: 40px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        /* Abas Dinâmicas */
        .tabs-header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .delete-tab {
            font-size: 12px;
            color: #ccc;
            cursor: pointer;
            margin-left: -5px;
            margin-right: 10px;
            transition: 0.2s;
        }
        .delete-tab:hover { color: var(--danger); }

        .add-tab-btn {
            background: #eee;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            flex-shrink: 0;
            transition: 0.2s;
        }

        /* Input e Lista */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .add-task-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        ul { list-style: none; padding: 0; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f9f9f9;
            position: relative;
        }

        .task-item:hover { background: #fafafa; }

        .task-item input { margin-right: 15px; transform: scale(1.3); cursor: pointer; }
        .completed { text-decoration: line-through; color: #aaa; }

        /* Botão de Excluir Task */
        .delete-task {
            position: absolute;
            right: 10px;
            color: #ddd;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
        }

        .task-item:hover .delete-task {
            opacity: 1;
        }

        .delete-task:hover {
            color: var(--danger);
        }

        /* Barra de Progresso Fixa */
        .progress-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 20px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
        }

        .progress-bg {
            width: 85%;
            max-width: 500px;
            height: 25px;
            background: #eee;
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--success);
            transition: width 0.4s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary);">Tarefas</h2>
    
    <div class="tabs-header" id="tabsHeader"></div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="O que precisa ser feito?">
        <button class="add-task-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<div class="progress-container">
    <div class="progress-bg">
        <div id="progressBar" class="progress-bar">0%</div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('userTabs')) || { "Geral": [] };
    let currentTab = Object.keys(db)[0] || "Geral";

    document.getElementById('taskInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });

    function save() {
        localStorage.setItem('userTabs', JSON.stringify(db));
        render();
    }

    function createTab() {
        const name = prompt("Nome da nova aba:");
        if (name && name.trim() !== "") {
            if (!db[name]) {
                db[name] = [];
                currentTab = name;
                save();
            } else {
                alert("Essa aba já existe!");
            }
        }
    }

    function deleteTab(name, e) {
        e.stopPropagation();
        if (confirm(`Excluir a aba "${name}"?`)) {
            delete db[name];
            const abas = Object.keys(db);
            currentTab = abas.length > 0 ? abas[0] : (db["Geral"] = [], "Geral");
            save();
        }
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        if (!db[currentTab]) db[currentTab] = [];
        db[currentTab].push({ text: input.value, done: false });
        input.value = '';
        save();
    }

    function toggleTask(index) {
        db[currentTab][index].done = !db[currentTab][index].done;
        save();
    }

    function removeTask(index) {
        db[currentTab].splice(index, 1);
        save();
    }

    function render() {
        const tabsHeader = document.getElementById('tabsHeader');
        tabsHeader.innerHTML = '';
        Object.keys(db).forEach(tabName => {
            const wrapper = document.createElement('div');
            wrapper.className = 'tab-wrapper';
            wrapper.innerHTML = `
                <button class="tab-btn ${tabName === currentTab ? 'active' : ''}" 
                        onclick="currentTab='${tabName}'; render();">${tabName}</button>
                <span class="delete-tab" onclick="deleteTab('${tabName}', event)">✕</span>
            `;
            tabsHeader.appendChild(wrapper);
        });

        const addTabBtn = document.createElement('button');
        addTabBtn.className = 'add-tab-btn';
        addTabBtn.innerText = '+';
        addTabBtn.onclick = createTab;
        tabsHeader.appendChild(addTabBtn);

        const list = document.getElementById('taskList');
        list.innerHTML = '';
        const tasks = db[currentTab] || [];
        let concluidas = 0;

        tasks.forEach((task, index) => {
            if (task.done) concluidas++;
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})">
                <span class="${task.done ? 'completed' : ''}">${task.text}</span>
                <span class="delete-task" onclick="removeTask(${index})">✕</span>
            `;
            list.appendChild(li);
        });

        const total = tasks.length;
        const porcentagem = total === 0 ? 0 : Math.round((concluidas / total) * 100);
        const bar = document.getElementById('progressBar');
        bar.style.width = porcentagem + '%';
        bar.innerText = porcentagem + '%';
        bar.style.background = porcentagem === 100 ? '#27ae60' : '#2ecc71';
    }

    render();
</script>

</body>
</html>
