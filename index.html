<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas - Outro Nível</title>
    
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAXklEQVRYw+2W0QqAIAxF7f9/uS99K8IsS8Te9pBy7uYclSmlFD9iYpLeXpL09pKkt5ckvS9NInmZpPdIOnp6L8mO8S7ZHeNdsjvGu2R3jHfJ7hjvkt0x3iW7Y7xL9m8S9fSSeAnp6f0S0tP7vUnvD8InS99vS67lAAAAAElFTkSuQmCC">
    <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAXklEQVRYw+2W0QqAIAxF7f9/uS99K8IsS8Te9pBy7uYclSmlFD9iYpLeXpL09pKkt5ckvS9NInmZpPdIOnp6L8mO8S7ZHeNdsjvGu2R3jHfJ7hjvkt0x3iW7Y7xL9m8S9fSSeAnp6f0S0tP7vUnvD8InS99vS67lAAAAAElFTkSuQmCC">

    <style>
        :root {
            --primary: #6200ee;
            --bg: #f4f7f6;
            --text: #333;
            --success: #2ecc71;
            --danger: #e74c3c;
            --edit-color: #3498db;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 600px;
            background: white;
            margin-top: 40px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .tabs-header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .delete-tab {
            font-size: 12px;
            color: #ccc;
            cursor: pointer;
            margin-left: -5px;
            margin-right: 10px;
            transition: 0.2s;
        }
        .delete-tab:hover { color: var(--danger); }

        .add-tab-btn {
            background: #eee;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .add-task-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        ul { list-style: none; padding: 0; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f9f9f9;
            position: relative;
        }

        .task-item:hover { background: #fafafa; }

        .task-text {
            flex: 1;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .task-text:not(.completed):hover {
            background: #f0f7ff;
        }
        .task-text:not(.completed):hover::after {
            content: " ✎";
            color: var(--edit-color);
            font-size: 0.9em;
        }

        .edit-input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--edit-color);
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .task-item input[type="checkbox"] { 
            margin-right: 15px; 
            transform: scale(1.3); 
            cursor: pointer; 
        }
        
        .completed { text-decoration: line-through; color: #aaa; }

        .delete-task {
            color: #ddd;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            padding: 5px;
        }

        .task-item:hover .delete-task { opacity: 1; }
        .delete-task:hover { color: var(--danger); }

        .progress-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 20px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
        }

        .progress-bg {
            width: 85%;
            max-width: 500px;
            height: 25px;
            background: #eee;
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--success);
            transition: width 0.4s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary);">Tarefas</h2>
    
    <div class="tabs-header" id="tabsHeader"></div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="O que precisa ser feito?">
        <button class="add-task-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<div class="progress-container">
    <div class="progress-bg">
        <div id="progressBar" class="progress-bar">0%</div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('userTabs')) || { "Geral": [] };
    let currentTab = Object.keys(db)[0] || "Geral";

    document.getElementById('taskInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });

    function save() {
        localStorage.setItem('userTabs', JSON.stringify(db));
        render();
    }

    function createTab() {
        const name = prompt("Nome da nova aba:");
        if (name && name.trim() !== "") {
            if (!db[name]) {
                db[name] = [];
                currentTab = name;
                save();
            } else {
                alert("Essa aba já existe!");
            }
        }
    }

    function deleteTab(name, e) {
        e.stopPropagation();
        if (confirm(`Excluir a aba "${name}"?`)) {
            delete db[name];
            const abas = Object.keys(db);
            currentTab = abas.length > 0 ? abas[0] : (db["Geral"] = [], "Geral");
            save();
        }
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        if (!db[currentTab]) db[currentTab] = [];
        db[currentTab].push({ text: input.value, done: false });
        input.value = '';
        save();
    }

    function toggleTask(index) {
        db[currentTab][index].done = !db[currentTab][index].done;
        save();
    }

    function removeTask(index) {
        db[currentTab].splice(index, 1);
        save();
    }

    function editTask(index, spanElement) {
        if (db[currentTab][index].done) return;

        const currentText = db[currentTab][index].text;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'edit-input';
        input.value = currentText;

        const saveEdit = () => {
            const newText = input.value.trim();
            if (newText && newText !== currentText) {
                db[currentTab][index].text = newText;
                save();
            } else {
                render(); 
            }
        };

        input.onblur = saveEdit;
        input.onkeydown = (e) => {
            if (e.key === 'Enter') saveEdit();
            if (e.key === 'Escape') render();
        };

        spanElement.replaceWith(input);
        input.focus();
    }

    function render() {
        // Abas
        const tabsHeader = document.getElementById('tabsHeader');
        tabsHeader.innerHTML = '';
        Object.keys(db).forEach(tabName => {
            const wrapper = document.createElement('div');
            wrapper.className = 'tab-wrapper';
            
            const btn = document.createElement('button');
            btn.className = `tab-btn ${tabName === currentTab ? 'active' : ''}`;
            btn.innerText = tabName;
            btn.onclick = () => { currentTab = tabName; render(); };

            const delTab = document.createElement('span');
            delTab.className = 'delete-tab';
            delTab.innerText = '✕';
            delTab.onclick = (e) => deleteTab(tabName, e);

            wrapper.appendChild(btn);
            wrapper.appendChild(delTab);
            tabsHeader.appendChild(wrapper);
        });

        const addTabBtn = document.createElement('button');
        addTabBtn.className = 'add-tab-btn';
        addTabBtn.innerText = '+';
        addTabBtn.onclick = createTab;
        tabsHeader.appendChild(addTabBtn);

        // Lista de Tarefas (com appendChild para manter o evento de editar)
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        const tasks = db[currentTab] || [];
        let concluidas = 0;

        tasks.forEach((task, index) => {
            if (task.done) concluidas++;
            const li = document.createElement('li');
            li.className = 'task-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = task.done;
            checkbox.onchange = () => toggleTask(index);

            const span = document.createElement('span');
            span.className = `task-text ${task.done ? 'completed' : ''}`;
            span.innerText = task.text;
            span.onclick = () => editTask(index, span);

            const delBtn = document.createElement('span');
            delBtn.className = 'delete-task';
            delBtn.innerText = '✕';
            delBtn.onclick = () => removeTask(index);

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(delBtn);
            list.appendChild(li);
        });

        // Barra de Progresso
        const total = tasks.length;
        const porcentagem = total === 0 ? 0 : Math.round((concluidas / total) * 100);
        const bar = document.getElementById('progressBar');
        bar.style.width = porcentagem + '%';
        bar.innerText = porcentagem + '%';
        bar.style.background = porcentagem === 100 ? '#27ae60' : '#2ecc71';
    }

    render();
</script>

</body>
</html>
